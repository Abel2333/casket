name: Casket Gitea CI
run-name: ${{ gitea.actor }} runs CI for casket
on: 
  push:
    branches:
      - master

jobs:
  Unit-Tests:
    runs-on: ubuntu-latest
    container:
      image: rust:1.89

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: cargo test
