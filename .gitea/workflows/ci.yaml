name: Casket Gitea CI
run-name: ${{ gitea.actor }} runs CI for casket
on: 
  push:
    branches:
      - master

jobs:
  Unit-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests
        run: cargo test
