name: Casket GitHub CI
run-name: ${{ github.actor }} runs CI for casket
on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/abel2333/casket-ci:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run unit tests
        run: cargo test
